<!doctype html>
<html lang="en" data-theme="system">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#EFFAFF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#090C17" media="(prefers-color-scheme: dark)" />
  <title>Weekly Flow — Liquid Glass</title>
  <meta name="description" content="A Liquid Glass weekly timetable and progress web app." />
  <meta name="application-name" content="Weekly Flow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Weekly Flow" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="splash-1170x2532.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="splash-1290x2796.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="splash-1179x2556.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" href="splash-1668x2388.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="splash-2048x2732.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="wallpaperLayer" class="wallpaper-layer" aria-hidden="true"></div>
  <div class="aurora" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
    <span class="grain"></span>
  </div>

  <div id="app" class="app-shell">
    <aside class="sidebar glass-panel">
      <button class="brand" data-action="tab" data-tab="today" aria-label="Go to today">
        <span class="brand-mark">✦</span>
        <span>
          <strong>Weekly Flow</strong>
          <small>Liquid Glass</small>
        </span>
      </button>

      <nav class="tab-nav" aria-label="Main sections">
        <button class="nav-item active" data-action="tab" data-tab="today"><span>◷</span>Today</button>
        <button class="nav-item" data-action="tab" data-tab="week"><span>▦</span>Week</button>
        <button class="nav-item" data-action="tab" data-tab="insights"><span>⌁</span>Insights</button>
        <button class="nav-item" data-action="tab" data-tab="plan"><span>＋</span>Plan</button>
        <button class="nav-item" data-action="tab" data-tab="med"><span>⚕</span>Med Interview</button>
        <button class="nav-item" data-action="tab" data-tab="settings"><span>⚙</span>Settings</button>
      </nav>

      <div class="mini-card">
        <p class="eyebrow">Current focus</p>
        <strong id="sidebarFocusTitle">—</strong>
        <small id="sidebarFocusMeta">No upcoming block</small>
        <button class="soft-button full" data-action="open-focus">Open focus mode</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar glass-panel">
        <div>
          <p class="eyebrow">Today</p>
          <h1 id="headlineDate">Weekly plan</h1>
          <p id="headlineSub" class="muted">Your day in a calm, structured timeline.</p>
        </div>
        <div class="top-actions">
          <div class="live-clock" aria-label="Live clock">
            <strong id="liveClockTime">--:--</strong>
            <small id="liveClockDate">Loading</small>
          </div>
          <button class="icon-button" data-action="prev-week" title="Previous week">‹</button>
          <button class="soft-button" data-action="go-today">Today</button>
          <button class="icon-button" data-action="next-week" title="Next week">›</button>
          <button class="icon-button" data-action="toggle-theme" title="Toggle theme">☾</button>
        </div>
      </header>

      <section class="date-strip glass-panel" id="dateStrip" aria-label="Week days"></section>

      <section class="stats-grid" id="statsGrid" aria-label="Daily summary"></section>

      <section class="content glass-panel" id="content" aria-live="polite"></section>
    </main>
  </div>

  <button class="floating-add" data-action="tab" data-tab="plan" title="Add extra task">＋</button>

  <dialog id="focusDialog" class="focus-dialog glass-panel">
    <button class="dialog-close" data-action="close-focus" aria-label="Close focus mode">×</button>
    <div id="focusContent"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
